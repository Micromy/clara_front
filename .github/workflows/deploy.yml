name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - snp
      - claude/copy-clara-mockup-6dqyU
      - claude/arias-rebrand-and-features
      - claude/ui-improvements
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute deploy subdirectory
        id: subdir
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "main" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "base=/clara_front/" >> "$GITHUB_OUTPUT"
          else
            # Convert branch name to URL-safe slug: claude/ui-improvements -> ui-improvements
            SLUG=$(echo "$BRANCH" | sed 's|.*/||')
            echo "dir=$SLUG" >> "$GITHUB_OUTPUT"
            echo "base=/clara_front/$SLUG/" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base ${{ steps.subdir.outputs.base }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.subdir.outputs.dir }}
          keep_files: true
